version: '3'

services:
  trafiboard:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/bartoszkaszewczuk/trafiboard:latest
    ports:
      - 8080:8080
    environment:
      TB_HOSTS: >
        [
          {
            "url": "https://traefik.example.com",
            "username": "",
            "password": ""
          },
          {
            "url": "https://192.168.0.1",
            "username": "",
            "password": ""
          }
        ]
